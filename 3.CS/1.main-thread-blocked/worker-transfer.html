<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Worker Copy vs Transfer</title>
    <style>
        body {
            font-family: system-ui;
            padding: 16px;
        }

        button {
            padding: 10px 14px;
            font-size: 16px;
            margin-right: 8px;
        }

        pre {
            background: #111;
            color: #eee;
            padding: 12px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>Worker: Copy vs Transferable</h1>
    <p>버튼을 눌러 50MB ArrayBuffer를 Worker로 보내고, 처리 완료까지 시간을 비교합니다.</p>

    <button id="copy">Send COPY</button>
    <button id="transfer">Send TRANSFER</button>

    <h3>Log</h3>
    <pre id="log"></pre>

    <script>
        const logEl = document.querySelector("#log");
        const log = (s) => { logEl.textContent += s + "\n"; console.log(s); };

        // 1) Worker 코드(받은 버퍼를 읽고, 간단히 계산한 뒤 응답)
        const workerCode = `
      self.onmessage = (e) => {
        const buf = e.data.buf;
        const arr = new Uint8Array(buf);
        let sum = 0;
        // 전체를 다 돌면 너무 오래 걸릴 수 있어 4KB마다 샘플링
        for (let i = 0; i < arr.length; i += 4096) sum += arr[i];
        self.postMessage({ sum, bytes: arr.byteLength });
      };
    `;
        const worker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: "text/javascript" })));

        // 2) 50MB 버퍼 준비
        const sizeMB = 50;
        const bytes = sizeMB * 1024 * 1024;
        const bufOriginal = new ArrayBuffer(bytes);
        const viewOriginal = new Uint8Array(bufOriginal);
        viewOriginal.fill(7);
        log(`Prepared ${sizeMB}MB ArrayBuffer`);

        // 3) 공통: 측정 래퍼
        function run(label, sendFn) {
            return new Promise((resolve) => {
                const t0 = performance.now();
                worker.onmessage = (e) => {
                    const ms = (performance.now() - t0).toFixed(1);
                    log(`${label} done: ${ms}ms (bytes=${e.data.bytes}, sum=${e.data.sum})`);
                    resolve(ms);
                };
                sendFn();
            });
        }

        // 4) COPY: structured clone(복사)로 전달
        async function sendCopy() {
            // 같은 버퍼를 여러 번 쓰기 위해 slice로 새 버퍼를 준비(공정성)
            const buf = bufOriginal.slice(0);
            await run("COPY", () => worker.postMessage({ buf }));
        }

        // 5) TRANSFER: 소유권을 Worker로 넘김(복사 최소화)
        async function sendTransfer() {
            // transfer하면 원본이 detached 되므로, 매번 새 버퍼 필요
            const buf = bufOriginal.slice(0);
            await run("TRANSFER", () => worker.postMessage({ buf }, [buf]));
            // 참고: 여기서 buf는 detached 되어 length 접근 불가(정상)
        }

        document.querySelector("#copy").onclick = () => sendCopy();
        document.querySelector("#transfer").onclick = () => sendTransfer();

        // 보너스: 워밍업(첫 실행은 JIT/Worker 초기화로 튈 수 있음)
        // 필요하면 copy 한 번 먼저 누르고 비교 시작
    </script>
</body>

</html>
